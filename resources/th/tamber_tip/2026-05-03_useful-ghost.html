        // --- RANDOMIZER FUNCTION ---
        function randomWord() {
            const container = document.getElementById('random-card-content');
            const randomItem = vocabList[Math.floor(Math.random() * vocabList.length)];
            
            container.innerHTML = '';
            
            const card = document.createElement('div');
            card.className = "card-anim";
            
            card.innerHTML = `
                <div class="flex flex-col items-center gap-2">
                    <button onclick="speakThai('${randomItem.t}')" class="text-fuchsia-500 hover:text-fuchsia-400 mb-2">
                         <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                        </svg>
                    </button>
                    <h3 class="text-3xl font-bold text-stone-100 text-center mb-2 cursor-pointer" onclick="speakThai('${randomItem.t}')">${randomItem.t}</h3>
                    
                    <div class="flex gap-2 mb-3">
                        <button onclick="this.nextElementSibling.classList.toggle('hidden')" class="text-xs border border-fuchsia-500 px-3 py-1 rounded text-fuchsia-300 hover:bg-fuchsia-900">Show IPA</button>
                        <div class="hidden text-lg font-mono text-fuchsia-300 bg-indigo-900 px-2 rounded">${randomItem.i}</div>
                    </div>

                    <div class="flex gap-2">
                        <button onclick="this.nextElementSibling.classList.toggle('hidden')" class="text-xs border border-fuchsia-500 px-3 py-1 rounded text-fuchsia-300 hover:bg-fuchsia-900">Show EN</button>
                        <div class="hidden text-lg text-stone-300 font-semibold">${randomItem.e}</div>
                    </div>
                </div>
            `;
            container.appendChild(card);
        }

        // --- RENDER FUNCTIONS ---
        function renderList(data, containerId) {
            const container = document.getElementById(containerId);
            container.innerHTML = ''; 
            data.forEach(item => {
                const el = createInteractiveElement(item);
                el.classList.add('border-b', 'border-indigo-800', 'pb-4'); 
                container.appendChild(el);
            });
        }

        function renderSingle(dataItem, targetId, customClass = '') {
            const container = document.getElementById(targetId);
            if(container) {
                container.innerHTML = ''; 
                const el = createInteractiveElement(dataItem);
                if(customClass) {
                    const thaiText = el.querySelector('.thai-content');
                    thaiText.className = `thai-content cursor-pointer select-none leading-relaxed text-stone-100 ${customClass}`;
                }
                container.appendChild(el);
            }
        }

        // Core Function
        function createInteractiveElement(item) {
            const template = document.getElementById('sentence-template');
            const clone = template.content.cloneNode(true);
            const root = clone.querySelector('div'); 

            const thaiEl = clone.querySelector('.thai-content');
            thaiEl.textContent = item.thai;
            thaiEl.onclick = () => speakThai(item.thai);

            clone.querySelector('.ipa-display').textContent = item.ipa;
            clone.querySelector('.en-display').textContent = item.en;

            const speakBtn = clone.querySelector('.speak-btn');
            speakBtn.onclick = () => speakThai(item.thai);

            const ipaBtn = clone.querySelector('.ipa-toggle');
            const ipaDiv = clone.querySelector('.ipa-display');
            ipaBtn.onclick = () => { ipaDiv.classList.toggle('hidden'); toggleBtnStyle(ipaBtn); };

            const enBtn = clone.querySelector('.en-toggle');
            const enDiv = clone.querySelector('.en-display');
            enBtn.onclick = () => { enDiv.classList.toggle('hidden'); toggleBtnStyle(enBtn); };

            ipaDiv.classList.add('all-ipa');
            enDiv.classList.add('all-en');

            return root;
        }

        function toggleBtnStyle(btn) {
            btn.classList.toggle('active');
        }

        // --- TTS LOGIC ---
        function speakThai(text) {
            window.speechSynthesis.cancel();
            const cleanText = text.replace(/[\u{1F600}-\u{1F64F}\u{1F300}-\u{1F5FF}\u{1F680}-\u{1F6FF}\u{1F1E0}-\u{1F1FF}]/gu, ''); 
            const utterance = new SpeechSynthesisUtterance(cleanText);
            utterance.lang = 'th-TH';
            utterance.rate = 0.9; 
            const voices = window.speechSynthesis.getVoices();
            const thaiVoice = voices.find(v => v.lang.includes('th'));
            if (thaiVoice) utterance.voice = thaiVoice;
            window.speechSynthesis.speak(utterance);
        }

        // --- TOGGLE ALL ---
        function toggleAll(type) {
            const targets = document.querySelectorAll(`.all-${type}`);
            if(targets.length === 0) return;
            const isHidden = targets[0].classList.contains('hidden');
            targets.forEach(el => {
                if (isHidden) el.classList.remove('hidden');
                else el.classList.add('hidden');
            });
            const allBtns = document.querySelectorAll(`.${type}-toggle`);
            allBtns.forEach(btn => {
                const isActive = btn.classList.contains('active');
                if (isHidden && !isActive) toggleBtnStyle(btn);
                if (!isHidden && isActive) toggleBtnStyle(btn);
            });
        }

        // --- INIT ---
        document.addEventListener('DOMContentLoaded', () => {
            // Headers
            renderSingle(uiData.headerScript, 'header-script', 'text-xl font-bold');
            renderSingle(uiData.headerExtension, 'header-extension', 'text-xl font-bold');
            
            renderSingle(uiData.headerExt1, 'header-ext-1');
            renderSingle(uiData.headerExt2, 'header-ext-2');
            renderSingle(uiData.headerExt3, 'header-ext-3');
            renderSingle(uiData.headerExt4, 'header-ext-4');
            renderSingle(uiData.headerExt5, 'header-ext-5');
            renderSingle(uiData.headerExt6, 'header-ext-6');
            renderSingle(uiData.headerExt7, 'header-ext-7');
            renderSingle(uiData.headerExt8, 'header-ext-8');

            // Dialogue Lists
            renderList(dataScript, 'container-script');
            renderList(dataExt1, 'container-ext-1');
            renderList(dataExt2, 'container-ext-2');
            renderList(dataExt3, 'container-ext-3');
            renderList(dataExt4, 'container-ext-4');
            renderList(dataExt5, 'container-ext-5');
            renderList(dataExt6, 'container-ext-6');
            renderList(dataExt7, 'container-ext-7');
            renderList(dataExt8, 'container-ext-8');
            
            randomWord();
            window.speechSynthesis.getVoices();
        });

    </script>
