<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>บทเรียนภาษาไทย: โฆษณา</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      body { margin: 0; padding: 0; background-color: #f8fafc; min-height: 100vh; }
      #root:empty::before {
        content: "กำลังโหลดบทเรียน... (Loading...)";
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        color: #64748b;
        font-family: sans-serif;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18.2.0",
          "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
          "lucide-react": "https://esm.sh/lucide-react@0.344.0"
        }
      }
    </script>

    <script type="text/babel" data-type="module">
      import React from 'react';
      import { createRoot } from 'react-dom/client';

      const loadApp = async () => {
        try {
          const appUrl = './src/2569-03-08_koht-sa-naa.js';
          console.log("กำลังโหลดไฟล์จาก:", appUrl);

          const module = await import(appUrl);
          const App = module.default;

          const rootElement = document.getElementById('root');
          const root = createRoot(rootElement);
          root.render(<App />);
        } catch (error) {
          console.error("เกิดข้อผิดพลาดในการโหลด App:", error);
          document.getElementById('root').innerHTML = `
            <div style="padding: 40px; color: #ef4444; text-align: center; font-family: sans-serif;">
              <h3 style="font-size: 1.5rem; margin-bottom: 10px;">❌ เกิดข้อผิดพลาดในการโหลดระบบ</h3>
              <p style="color: #64748b;">ไม่สามารถโหลดไฟล์: ./src/2569-03-08_koht-sa-naa.js</p>
              <pre style="margin-top:20px; font-size:0.9rem; background:#fee2e2; padding:15px; border-radius:8px; display:inline-block; text-align:left; max-width:80%; white-space:pre-wrap;">${String(error)}</pre>
            </div>
          `;
        }
      };

      loadApp();
    </script>
  </body>
</html>
