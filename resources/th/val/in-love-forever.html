        // --- CORE FUNCTIONS ---

        function speak(text) {
            window.speechSynthesis.cancel();
            // Clean emojis before TTS
            const cleanText = text.replace(/[\u{1F600}-\u{1F6FF}\u{1F300}-\u{1F5FF}\u{1F680}-\u{1F6FF}\u{1F700}-\u{1F77F}\u{1F780}-\u{1F7FF}\u{1F800}-\u{1F8FF}\u{1F900}-\u{1F9FF}\u{1FA00}-\u{1FA6F}\u{1FA70}-\u{1FAFF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}]/gu, '');
            const utterance = new SpeechSynthesisUtterance(cleanText);
            utterance.lang = 'th-TH';
            utterance.rate = 0.9;
            window.speechSynthesis.speak(utterance);
        }

        // Component Generator
        function createSmartText(data, classes = "text-lg") {
            const id = Math.random().toString(36).substr(2, 9);
            const thai = data.thai || data.t;
            const ipa = data.ipa || data.i;
            const en = data.en || data.e;

            return `
                <div class="inline-block w-full text-left" id="${id}">
                    <div class="flex flex-wrap items-center gap-2 mb-1">
                        <span class="font-medium ${classes} text-gray-800 cursor-pointer hover:text-rose-500 transition-colors" onclick="speak('${thai}')">
                            ${thai}
                        </span>
                        
                        <div class="inline-flex gap-1 ml-1">
                            <button onclick="speak('${thai}')" class="w-6 h-6 rounded-full bg-rose-50 hover:bg-rose-100 text-rose-400 hover:text-rose-600 flex items-center justify-center transition-all">
                                <i class="fas fa-volume-up text-xs"></i>
                            </button>
                            <button onclick="toggleVisibility('${id}', 'ipa', this)" class="btn-toggle text-gray-500">IPA</button>
                            <button onclick="toggleVisibility('${id}', 'en', this)" class="btn-toggle text-gray-500">EN</button>
                        </div>
                    </div>

                    <div class="ipa-content hidden mt-1 ml-2 pl-2 border-l-2 border-fuchsia-200" data-target="ipa">
                        <span class="ipa-text">/${ipa}/</span>
                    </div>
                    <div class="en-content hidden mt-1 ml-2 pl-2 border-l-2 border-blue-200" data-target="en">
                        <span class="en-text">${en}</span>
                    </div>
                </div>
            `;
        }

        function toggleVisibility(containerId, type, btn) {
            const container = document.getElementById(containerId);
            const content = container.querySelector(`[data-target="${type}"]`);
            
            if (content.classList.contains('hidden')) {
                content.classList.remove('hidden');
                if (type === 'ipa') btn.classList.add('active-ipa');
                else btn.classList.add('active-en');
            } else {
                content.classList.add('hidden');
                if (type === 'ipa') btn.classList.remove('active-ipa');
                else btn.classList.remove('active-en');
            }
        }

        function spinRoulette() {
            const card = document.getElementById('vocab-card');
            card.innerHTML = `<i class="fas fa-spinner fa-spin text-4xl text-indigo-300"></i>`;
            
            setTimeout(() => {
                const word = vocabPool[Math.floor(Math.random() * vocabPool.length)];
                card.innerHTML = `
                    <div class="animate-pop w-full text-center">
                        ${createSmartText(word, "text-3xl")}
                    </div>
                `;
                speak(word.t);
            }, 600);
        }

        };
