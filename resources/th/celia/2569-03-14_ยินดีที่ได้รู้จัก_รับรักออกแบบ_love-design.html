            const [showIpa, setShowIpa] = useState(false);
            const [showEn, setShowEn] = useState(false);

            const handleSpeak = (e) => {
                e.stopPropagation();
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'th-TH';
                    utterance.rate = 0.85;
                    window.speechSynthesis.speak(utterance);
                }
            };

            let containerClass = "w-full rounded-2xl p-4 mb-3 transition-all relative ";
            let textClass = "font-medium cursor-pointer group flex-1 flex flex-wrap items-center gap-2 ";

            if (isTitle) {
                containerClass += "bg-blue-600 shadow-lg border border-blue-400";
                textClass += "text-2xl md:text-3xl font-bold text-white text-center justify-center";
            } else if (isHeader) {
                containerClass += "bg-blue-50 border-2 border-blue-200 shadow-sm";
                textClass += "text-xl md:text-2xl font-bold text-blue-800";
            } else if (isBox) {
                containerClass += "bg-white border-2 border-dashed border-slate-300 shadow-sm";
                textClass += "text-lg text-slate-700 italic justify-center text-center";
            } else {
                containerClass += "bg-white border border-slate-200 shadow-sm hover:border-blue-300 hover:shadow-md";
                textClass += "text-lg text-slate-800";
            }

            return (
                <div className={containerClass}>
                    {speaker && <div className="text-xs font-bold text-blue-500 uppercase mb-1">{speaker}</div>}
                    
                    <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-3">
                        <div onClick={handleSpeak} className={textClass}>

                            <span className="hover:text-blue-500 transition-colors">

                            </span>
                        </div>
                        
                        <div className="flex gap-2 shrink-0 self-end sm:self-auto">
                            <button 
                                onClick={() => setShowIpa(!showIpa)}
                                className={`px-3 py-1.5 text-xs font-bold rounded-lg transition-colors ${showIpa ? 'bg-amber-400 text-amber-900 shadow-inner' : (isTitle ? 'bg-blue-800 text-blue-200' : 'bg-slate-100 text-slate-500')}`}

                                IPA
                            </button>

                                onClick={() => setShowEn(!showEn)}
                                className={`px-3 py-1.5 text-xs font-bold rounded-lg transition-colors ${showEn ? 'bg-indigo-500 text-white shadow-inner' : (isTitle ? 'bg-blue-800 text-blue-200' : 'bg-slate-100 text-slate-500')}`}

                    </div>

                    {(showIpa || showEn) && (
                        <div className={`mt-3 pt-3 flex flex-col gap-2 fade-in border-t border-dashed ${isTitle ? 'border-blue-400/50' : 'border-slate-200'}`}>
                            {showIpa && (
                                <div className={`flex items-start gap-2 font-mono ${isTitle ? 'text-amber-200' : 'text-amber-600'}`}>
                                    <span className="text-[10px] font-bold uppercase mt-1 opacity-60">IPA</span>
                                    <span>{ipa}</span>
                                </div>
                            )}
                            {showEn && (
                                <div className={`flex items-start gap-2 ${isTitle ? 'text-indigo-200' : 'text-indigo-600'}`}>
                                    <span className="text-[10px] font-bold uppercase mt-1 opacity-60">EN</span>
                                    <span className="italic">{en}</span>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        // --- SECTIONS ---

        const ReviewSection = () => {
            const [currentIndex, setCurrentIndex] = useState(0);

            useEffect(() => { pickRandom(); }, []);

            const pickRandom = () => {
                const randIndex = Math.floor(Math.random() * reviewVocabList.length);
                setCurrentIndex(randIndex);
            };

            const word = reviewVocabList[currentIndex];
            if (!word) return null;

            return (
                <div className="space-y-4 pb-8 fade-in">
                    <ThaiText text="เกมทบทวนคำศัพท์" ipa="geem tób-tuan kam-sàp" en="Vocabulary Review Game" emoji="🎲" isHeader={true} />
                    <ThaiText text="สร้างประโยคจากคำนี้!" ipa="sâang bprà-yòok jàak kam níi!" en="Make a sentence from this word!" emoji="🎯" />
                    
                    <div className="bg-gradient-to-br from-blue-500 to-indigo-600 p-8 rounded-[2rem] shadow-xl text-center relative overflow-hidden mt-6">
                        <div className="text-8xl mb-6 drop-shadow-xl">{word.em}</div>
                        <ThaiText text={word.t} ipa={word.i} en={word.e} isTitle={true} />
                        
                        <button 
                            onClick={pickRandom}
                            className="mt-6 bg-white text-blue-700 font-bold text-lg px-8 py-4 rounded-full shadow-lg hover:scale-105 active:scale-95 transition-all flex items-center justify-center gap-2 mx-auto w-full sm:w-auto"
                        >
                            <Icon name="refresh" size={20} /> <span>สุ่มคำใหม่</span>
                        </button>
                    </div>

                    <div className="mt-8">
                        <ThaiText text="ตัวอย่างในชีวิตจริง" ipa="dtua-yàang nai chii-wít jing" en="Real-life Example" emoji="💡" isHeader={true} />
                        <ThaiText text="ฉัน สั่ง ยำ ทะเล พิเศษ" ipa="chǎn sàng yam tá-lay phí-sèet" en="I ordered special spicy seafood salad." emoji="🥗" isBox={true} />
                    </div>
                </div>
            );
        };

        const VideoSection = () => (
            <div className="space-y-4 pb-8 fade-in">
                <ThaiText text="ดูวิดีโอคลิป" ipa="duu wí-dii-oo klíp" en="Watch the video clip" emoji="🎬" isHeader={true} />
                <ThaiText text="เริ่มดูที่นาที 0:10 นะคะ" ipa="rə̂əm duu tîi naa-tii sǔun jùt nʉ̀ng sǔun ná-ká" en="Please start watching at 0:10" emoji="⏱️" />
                
                <div className="rounded-[2rem] overflow-hidden shadow-xl bg-black aspect-video relative border-4 border-blue-100">
                    <iframe 
                        className="w-full h-full absolute top-0 left-0"
                        src="https://drive.google.com/file/d/1qIh0yrHP-ucrtXcQKkQLy-zaS0-Umls7/preview" 
                        title="Google Drive Video Player" 
                        frameBorder="0" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                        allowFullScreen>
                    </iframe>
                </div>

                <div className="mt-8 space-y-2">
                    <ThaiText text="บทสนทนา" ipa="bòt sǒn-tá-naa" en="Dialogue" emoji="💬" isHeader={true}/>
                    {scriptData.map((line, i) => (
                        <ThaiText key={i} text={line.t} ipa={line.i} en={line.e} emoji={line.em} speaker={line.speaker} />
                    ))}
                </div>
            </div>
        );

        const VocabSection = () => (
            <div className="space-y-4 pb-8 fade-in">
                <ThaiText text="คำศัพท์น่ารู้ 5 คำ" ipa="kam-sàp nâa-rúu hâa kam" en="5 Useful Vocabulary Words" emoji="🧠" isHeader={true} />
                <ThaiText text="คำศัพท์สำหรับชีวิตจริง" ipa="kam-sàp sǎm-ràp chii-wít jing" en="Vocabulary for real life" emoji="🌍" />
                
                <div className="flex flex-col gap-2 mt-4">
                    {targetVocab.map((v, i) => (
                        <ThaiText key={i} text={v.t} ipa={v.i} en={v.e} emoji={v.em} />
                    ))}
                </div>
            </div>
        );

        const SpeakingSection = () => (
            <div className="space-y-6 pb-8 fade-in">
                <ThaiText text="กิจกรรมพูดในชีวิตจริง" ipa="gìt-jà-gam pûut nai chii-wít jing" en="Real-life Speaking Activities" emoji="🗣️" isHeader={true} />

                {/* Roleplay 1 */}
                <div className="bg-sky-50 p-5 rounded-[2rem] border-2 border-sky-200 shadow-sm">
                    <ThaiText text="บทบาทสมมติ: วันแรกที่ทำงาน" ipa="bòt-bàat sǒm-mút: wan rɛ̂ɛk tîi tam-ngaan" en="Roleplay: First day at work" emoji="🏢" isHeader={true}/>
                    <ThaiText text="ใช้คำศัพท์: ยินดีที่ได้รู้จัก, ทุกคน, เริ่มงาน" ipa="chái kam-sàp: yin-dii tîi dâi rúu-jàk, túk-kon, rə̂əm ngaan" en="Use vocab: Nice to meet you, Everyone, Start working" emoji="🎯" isBox={true} />
                    
                    <div className="mt-4 space-y-2">
                        <ThaiText text="คุณ: สวัสดีค่ะ ยินดีที่ได้รู้จัก ทุกคน ค่ะ" ipa="kun: sà-wàt-dii kâ, yin-dii tîi dâi rúu-jàk túk-kon kâ" en="You: Hello, nice to meet you everyone." emoji="🙋‍♀️" speaker="A"/>
                        <ThaiText text="เพื่อนร่วมงาน: สวัสดีครับ เรามา เริ่มงาน กันเลยไหม?" ipa="pʉ̂an-rûam-ngaan: sà-wàt-dii kráp, rao maa rə̂əm ngaan gan ləəi mǎi?" en="Colleague: Hello, shall we start working right away?" emoji="👨‍💻" speaker="B"/>
                    </div>
                </div>

                {/* Real-life Discussion */}
                <div className="bg-amber-50 p-5 rounded-[2rem] border-2 border-amber-200 shadow-sm">
                    <ThaiText text="สนทนา: งานของคุณ" ipa="sǒn-tá-naa: ngaan kɔ̌ɔng kun" en="Discussion: Your work" emoji="☕" isHeader={true}/>
                    <ThaiText text="ตอบคำถามเหล่านี้" ipa="dtɔ̀ɔp kǎm-tǎam lǎo níi" en="Answer these questions" emoji="🎯" isBox={true} />
                    
                    <div className="mt-4 space-y-2">
                        <ThaiText text="ปกติคุณ เริ่ม ทำงานกี่โมง?" ipa="bpòk-gà-dtì kun rə̂əm tam-ngaan gìi moong?" en="Normally, what time do you start working?" emoji="⏰" />
                        <ThaiText text="คุณชอบ ทำงาน ที่ออฟฟิศ หรือ ที่บ้าน?" ipa="kun chɔ̂ɔp tam-ngaan tîi ɔ́pfít rʉ̌ʉ tîi bâan?" en="Do you like working at the office or at home?" emoji="🏠" />
                    </div>
                </div>
            </div>
        );

        const ExtensionSection = () => (
            <div className="space-y-6 pb-8 fade-in">
                <ThaiText text="กิจกรรมเสริม" ipa="gìt-jà-gam sə̌əm" en="Extension Activities" emoji="🚀" isHeader={true} />

                {/* Real-life Interview */}
                <div className="bg-emerald-50 p-5 rounded-[2rem] border-2 border-emerald-200 shadow-sm">
                    <ThaiText text="สัมภาษณ์งาน" ipa="sǎm-pâat ngaan" en="Job Interview" emoji="💼" isHeader={true}/>
                    <ThaiText text="ใช้คำศัพท์: แนะนำ, ทำไม, ยินดีที่ได้รู้จัก" ipa="chái kam-sàp: náe-nam, tam-mai, yin-dii tîi dâi rúu-jàk" en="Use vocab: Introduce, Why, Nice to meet you" emoji="🎯" isTitle={true}/>
                    <ThaiText text="ให้นักเรียน แนะนำ ตัวเอง" ipa="hâi nák-rian náe-nam dtua-eeng" en="Have the student introduce themselves." emoji="🗣️" isBox={true} />
                </div>

                {/* Speaking Game */}
                <div className="bg-purple-50 p-5 rounded-[2rem] border-2 border-purple-200 shadow-sm">
                    <ThaiText text="เกมต่อประโยค" ipa="geem dtɔ̀ɔ bprà-yòok" en="Sentence Chain Game" emoji="🔗" isHeader={true}/>
                    <ThaiText text="พูดว่า: 'ยินดีที่ได้รู้จัก ฉันชอบ...'" ipa="pûut wâa: 'yin-dii tîi dâi rúu-jàk, chǎn chɔ̂ɔp...'" en="Say: 'Nice to meet you, I like...'" emoji="🎯" isBox={true} />
                    <ThaiText text="ตัวอย่าง: ยินดีที่ได้รู้จัก ฉันชอบ กิน หมูกรอบ" ipa="dtua-yàang: yin-dii tîi dâi rúu-jàk, chǎn chɔ̂ɔp gin mǔu-grɔ̀ɔp" en="Example: Nice to meet you, I like to eat crispy pork." emoji="🐷" />
                </div>

                {/* Real-life Debate */}
                <div className="bg-rose-50 p-5 rounded-[2rem] border-2 border-rose-200 shadow-sm">
                    <ThaiText text="โต้วาที: วันแรกที่ทำงาน" ipa="dtôo-waa-tii: wan rɛ̂ɛk tîi tam-ngaan" en="Debate: First day at work" emoji="⚖️" isHeader={true}/>
                    <ThaiText text="เริ่มงาน เลย VS แนะนำ ตัวเอง ก่อน" ipa="rə̂əm ngaan ləəi VS náe-nam dtua-eeng gɔ̀ɔn" en="Start working immediately VS Introduce yourself first" emoji="🥊" isTitle={true}/>
                    <ThaiText text="คุณคิดว่าอะไรดีกว่ากัน? ทำไม?" ipa="kun kít wâa à-rai dii gwàa gan? tam-mai?" en="Which do you think is better? Why?" emoji="🤔" isBox={true} />
                </div>

                {/* Real-life Story-telling */}
                <div className="bg-orange-50 p-5 rounded-[2rem] border-2 border-orange-200 shadow-sm">
                    <ThaiText text="เล่าเรื่อง: วันแรกของฉัน" ipa="lâo rʉ̂ang: wan rɛ̂ɛk kɔ̌ɔng chǎn" en="Storytelling: My first day" emoji="📖" isHeader={true}/>
                    <ThaiText text="ใช้คำศัพท์: น่าตื่นเต้น, ยินดีที่ได้รู้จัก, ทุกคน, เพื่อน" ipa="chái kam-sàp: nâa-dtʉ̀ʉn-dtên, yin-dii tîi dâi rúu-jàk, túk-kon, pʉ̂an" en="Use vocab: Exciting, Nice to meet you, Everyone, Friends" emoji="🎯" isBox={true} />
                    <ThaiText text="เล่าเรื่อง วันแรก ที่ทำงาน หรือ ที่ มหาวิทยาลัย" ipa="lâo rʉ̂ang wan rɛ̂ɛk tîi tam-ngaan rʉ̌ʉ tîi má-hǎa-wít-tá-yaa-lai" en="Tell a story about your first day at work or university." emoji="🏫" />
                </div>

                {/* Real-life Presentation */}
                <div className="bg-teal-50 p-5 rounded-[2rem] border-2 border-teal-200 shadow-sm">
                    <ThaiText text="นำเสนอ: แนะนำทีมของคุณ" ipa="nam-sà-nə̌ə: náe-nam tiim kɔ̌ɔng kun" en="Presentation: Introduce your team" emoji="📊" isHeader={true}/>
                    <ThaiText text="ใช้คำศัพท์: แนะนำ, นี่, เป็น, ทำงาน" ipa="chái kam-sàp: náe-nam, nîi, bpen, tam-ngaan" en="Use vocab: Introduce, Here, To be, Work" emoji="🎯" isBox={true} />
                    <ThaiText text="แนะนำ เพื่อน หรือ ครอบครัว 3 คน ให้ครูรู้จัก" ipa="náe-nam pʉ̂an rʉ̌ʉ krɔ̂ɔp-krua sǎam kon hâi kruu rúu-jàk" en="Introduce 3 friends or family members to the teacher." emoji="👥" />
                </div>
            </div>
        );

        // --- MAIN APP ---
        const App = () => {
            const [currentTab, setCurrentTab] = useState('review');

            const tabs = [
                { id: 'review', icon: 'refresh', label: 'ทบทวน' },
                { id: 'video', icon: 'play', label: 'วิดีโอ' },
                { id: 'vocab', icon: 'star', label: 'คำศัพท์' },
                { id: 'speak', icon: 'message', label: 'พูด' },
                { id: 'ext', icon: 'zap', label: 'เสริม' }
            ];

            return (
                <div className="max-w-md mx-auto min-h-screen relative shadow-2xl bg-[#f8fafc] overflow-x-hidden">
                    
                    {/* Sticky Header */}
                    <div className="bg-white p-5 shadow-sm sticky top-0 z-40 border-b border-slate-200">
                        <ThaiText 
                            text="ยินดีที่ได้รู้จัก" 
                            ipa="yin-dii tîi dâi rúu-jàk" 
                            en="Nice to meet you" 
                            emoji="🤝" 
                            isTitle={true} 
                        />
                    </div>

                    {/* Content Area */}
                    <div className="px-5 pt-6 pb-28">
                        {currentTab === 'review' && <ReviewSection />}
                        {currentTab === 'video' && <VideoSection />}
                        {currentTab === 'vocab' && <VocabSection />}
                        {currentTab === 'speak' && <SpeakingSection />}
                        {currentTab === 'ext' && <ExtensionSection />}
                    </div>

                    {/* Bottom Navigation */}
                    <div className="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white/95 backdrop-blur-md border-t border-slate-200 shadow-[0_-10px_20px_rgba(0,0,0,0.05)] rounded-t-3xl z-50 pb-safe">
                        <div className="flex justify-between px-2 py-3">
                            {tabs.map(tab => (
                                <button
                                    key={tab.id}
                                    onClick={() => setCurrentTab(tab.id)}
                                    className={`flex flex-col items-center justify-center w-[20%] py-2 rounded-2xl transition-all ${currentTab === tab.id ? 'text-blue-600 scale-110' : 'text-slate-400 hover:text-blue-400'}`}
                                >
                                    <Icon name={tab.icon} size={24} className={currentTab === tab.id ? 'drop-shadow-md' : ''} />
                                    <span className={`text-[11px] mt-1 font-semibold ${currentTab === tab.id ? 'font-bold' : ''}`}>{tab.label}</span>
                                    {currentTab === tab.id && <div className="w-1 h-1 bg-blue-600 rounded-full mt-1"></div>}
                                </button>
                            ))}
                        </div>
                    </div>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
