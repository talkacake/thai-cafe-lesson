<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thai A1 Food & Family Lesson</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #f9fafb;
        }
        .thai-font { font-family: 'Sarabun', sans-serif; }
        /* Custom scrollbar for better look in iframes */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- SVG Icons to replace lucide-react in single file ---
        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                play: <path d="m6 3 14 9-14 9V3z"/>,
                volume2: (
                    <>
                        <path d="M11 5 6 9H2v6h4l5 4V5z"/>
                        <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
                        <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
                    </>
                ),
                bookOpen: (
                    <>
                        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
                        <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
                    </>
                ),
                messageCircle: <path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/>,
                star: <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>,
                zap: <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>,
                utensils: (
                    <>
                        <path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/>
                        <path d="M7 2v20"/>
                        <path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/>
                    </>
                ),
                users: (
                    <>
                        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
                        <circle cx="9" cy="7" r="4"/>
                        <path d="M22 21v-2a4 4 0 0 0-3-3.87"/>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                    </>
                ),
                refresh: (
                    <>
                        <path d="M1 4v6h6"/>
                        <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
                    </>
                )
            };
            return (
                <svg 
                    xmlns="http://www.w3.org/2000/svg" 
                    width={size} 
                    height={size} 
                    viewBox="0 0 24 24" 
                    fill="none" 
                    stroke="currentColor" 
                    strokeWidth="2" 
                    strokeLinecap="round" 
                    strokeLinejoin="round" 
                    className={className}
                >
                    {icons[name]}
                </svg>
            );
        };

        const App = () => {
            const [section, setSection] = useState('review');

            // --- DATA ---
            const targetVocab = [
                { t: "เหนื่อย", i: "nʉ̀ai", e: "Tired / Exhausted", em: "😫" },
                { t: "เรื่อยๆ", i: "rʉ̂ai-rʉ̂ai", e: "So-so / Taking it easy", em: "🍃" },
                { t: "ติดงาน", i: "dtìt ngaan", e: "Stuck at work / Busy", em: "💼" },
                { t: "มาด้วย", i: "maa dûai", e: "Come along / With", em: "🚶‍♂️" },
                { t: "ทำไม", i: "tam-mai", e: "Why", em: "🤷" }
            ];

            const scriptData = [
                { r: "พ่อ", t: "งานเหนื่อยไหม", i: "ngaan nʉ̀ai mǎi", e: "Is work tiring?", em: "👨" },
                { r: "แลมป์", t: "ก็ เรื่อยๆ ครับคุณพ่อ", i: "gɔ̂ rʉ̂ai-rʉ̂ai kráp kun-pɔ̂ɔ", e: "It's so-so, Dad.", em: "🧔" },
                { r: "แม่", t: "แล้ว ทำไมแอร์ไม่มาด้วยล่ะ", i: "lɛ́ɛo tam-mai Air mâi maa dûai là", e: "And why didn't Air come with you?", em: "👩" },
                { r: "แลมป์", t: "แอร์เขาติดงานอยู่น่ะครับ", i: "Air káo dtìt ngaan yùu nà kráp", e: "Air is stuck at work right now.", em: "🏢" }
            ];

            const reviewVocabList = [
                { t: "น้ำเปล่า", i: "náam-bplàao", e: "plain water", em: "💧🥤" },
                { t: "สั่ง", i: "sàng", e: "order", em: "📝" },
                { t: "ตาม", i: "dtaam", e: "follow", em: "➡️👣" },
                { t: "อาหารตามสั่ง", i: "aa-hăan-dtaam-sàng", e: "cooked-to-order food", em: "🍛🍽️" },
                { t: "แนะนำ", i: "náe-nam", e: "recommend / introduce", em: "💡🤝" },
                { t: "กะเพรา", i: "gà-prao", e: "basil", em: "🌿" },
                { t: "รสชาติ", i: "rót-châat", e: "Tastes / Flavours", em: "😋" },
                { t: "ยำ", i: "yam", e: "spicy salad", em: "🥗🌶️" },
                { t: "ทะเล", i: "tá-lay", e: "sea / seafood", em: "🌊" },
                { t: "น้ำแข็ง", i: "náam-kăeng", e: "ice", em: "🧊" },
                { t: "หมูกรอบ", i: "mǔu-grɔ̀ɔp", e: "crispy pork", em: "🐷🔥" },
                { t: "พิเศษ", i: "phí-sèet", e: "special / extra", em: "✨➕" },
                { t: "ไข่ดาว", i: "khài-daao", e: "fried egg", em: "🍳⭐" },
                { t: "ปลาหมึก", i: "bplaa-mʉ̀k", e: "squid", em: "🦑" },
                { t: "หวานน้อย", i: "wǎan-nɔ́ɔi", e: "Little sweet", em: "🍹" },
                { t: "กลับบ้าน", i: "glàp-bâan", e: "Takeaway / Go home", em: "🏠🚶" },
                { t: "ไข่มุก", i: "khài-múk", e: "pearls (boba)", em: "🧋🫧" },
                { t: "ดูอร่อย", i: "duu à-rɔ̀i", e: "looks delicious", em: "😋🍽️" },
                { t: "ครอบครัว", i: "krôp-krua", e: "family", em: "👨‍👩‍👧‍👦" },
                { t: "พี่น้อง", i: "pêe-nóng", e: "siblings", em: "👫👬" },
                { t: "แฟน", i: "faen", e: "partner / fan", em: "👨‍❤️‍💋‍👨" },
                { t: "หมา", i: "mǎa", e: "dog", em: "🐶" },
                { t: "แมว", i: "maeo", e: "cat", em: "😺" },
                { t: "รวย", i: "ruai", e: "rich", em: "🤑" },
                { t: "เที่ยว", i: "tîao", e: "travel / hang out", em: "🚗✈️" },
                { t: "แพง", i: "paaeng", e: "expensive", em: "💸" }
            ];

            const InteractiveText = ({ text, ipa, en, emoji, speaker, isHeader, isInstruction, small }) => {
                const [showDetail, setShowDetail] = useState(false);

                const speak = (e) => {
                    e.stopPropagation();
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'th-TH';
                    utterance.rate = 0.8;
                    window.speechSynthesis.speak(utterance);
                };

                if (isHeader) return (
                    <div className="mb-6 border-b-2 border-sky-100 pb-2">
                        <h2 className="text-2xl font-bold text-sky-800 flex items-center gap-2">
                            {emoji} {text}
                        </h2>
                        <p className="text-sm text-sky-500 font-mono">{ipa} • {en}</p>
                    </div>
                );

                if (isInstruction) return (
                    <div className="bg-amber-50 border-l-4 border-amber-400 p-3 mb-4 rounded-r-lg">
                        <p className="text-amber-800 font-medium flex items-center gap-2">
                            <Icon name="star" size={16} /> {text}
                        </p>
                        <p className="text-xs text-amber-600 mt-1 italic">{en}</p>
                    </div>
                );

                return (
                    <div 
                        onClick={() => setShowDetail(!showDetail)}
                        className={`bg-white p-4 rounded-xl border border-gray-100 shadow-sm hover:border-sky-300 transition-all cursor-pointer group ${small ? 'p-3' : ''}`}
                    >
                        {speaker && <span className="text-[10px] font-bold text-sky-400 uppercase tracking-widest block mb-1">{speaker}</span>}
                        <div className="flex justify-between items-center">
                            <div className="flex-1">
                                <span className={`text-gray-800 font-medium ${small ? 'text-lg' : 'text-xl'}`}>
                                    {text} {emoji}
                                </span>
                            </div>
                            <button onClick={speak} className="p-2 text-sky-400 hover:text-sky-600 hover:bg-sky-50 rounded-full transition-colors">
                                <Icon name="volume2" size={20} />
                            </button>
                        </div>
                        
                        {showDetail && (
                            <div className="mt-3 pt-3 border-t border-dashed border-gray-100 transition-all">
                                <p className="text-sky-600 font-mono text-sm">{ipa}</p>
                                <p className="text-gray-500 text-sm italic">{en}</p>
                            </div>
                        )}
                    </div>
                );
            };

            const ReviewSection = () => {
                const [index, setIndex] = useState(0);
                const nextCard = () => setIndex((prev) => (prev + 1) % reviewVocabList.length);

                return (
                    <div className="space-y-6">
                        <InteractiveText text="สุ่มคำศัพท์แต่งประโยค" ipa="sùm kam-sàp" en="Random Vocab Challenge" isHeader emoji="🎲" />
                        
                        <div className="bg-gradient-to-br from-sky-500 to-indigo-600 p-8 rounded-3xl shadow-xl flex flex-col items-center text-center text-white relative overflow-hidden">
                            <div className="absolute top-0 right-0 p-4 opacity-20"><Icon name="refresh" size={80} /></div>
                            <div className="text-7xl mb-6 bg-white/20 p-6 rounded-full backdrop-blur-sm">
                                {reviewVocabList[index].em}
                            </div>
                            <h3 className="text-4xl font-bold mb-2">{reviewVocabList[index].t}</h3>
                            <p className="text-xl opacity-90 font-mono">{reviewVocabList[index].i}</p>
                            <p className="text-lg mt-2 font-light italic">"{reviewVocabList[index].e}"</p>
                            
                            <button 
                                onClick={nextCard}
                                className="mt-8 bg-white text-indigo-600 px-8 py-3 rounded-full font-bold shadow-lg hover:bg-sky-50 transition-colors flex items-center gap-2"
                            >
                                คำต่อไป <Icon name="refresh" size={18} />
                            </button>
                        </div>

                        <InteractiveText 
                            text="กิจกรรม: ใช้คำศัพท์ข้างบนแต่งประโยคเกี่ยวกับความรู้สึก" 
                            en="Activity: Use the vocab above to make a sentence about feelings." 
                            isInstruction 
                        />
                        <div className="bg-white p-4 rounded-xl border-2 border-dashed border-gray-200 text-center text-gray-400 italic">
                            เช่น: "วันนี้ สั่ง หมูกรอบ เยอะ... เหนื่อย มาก" (Today ordered lots of crispy pork... very tired)
                        </div>
                    </div>
                );
            };

            const LearnSection = () => (
                <div className="space-y-8">
                    <div className="rounded-2xl overflow-hidden shadow-2xl aspect-video bg-black">
                        <iframe 
                            className="w-full h-full"
                            src="https://www.youtube.com/embed/584Dgp4GtA0" 
                            title="Thai Lesson Video"
                            frameBorder="0"
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                            allowFullScreen
                        ></iframe>
                    </div>

                    <div>
                        <InteractiveText text="คำศัพท์จากวิดีโอ" ipa="kam-sàp jàak video" en="Vocab from Video" isHeader emoji="📺" />
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                            {targetVocab.map((v, i) => (
                                <InteractiveText key={i} text={v.t} ipa={v.i} en={v.e} emoji={v.em} small />
                            ))}
                        </div>
                    </div>

                    <div>
                        <InteractiveText text="บทสนทนา" ipa="bòt sǒn-tá-naa" en="Dialogue" isHeader emoji="💬" />
                        <div className="space-y-3">
                            {scriptData.map((line, i) => (
                                <InteractiveText key={i} speaker={line.r} text={line.t} ipa={line.i} en={line.e} emoji={line.em} />
                            ))}
                        </div>
                    </div>
                </div>
            );

            const SpeakingSection = () => (
                <div className="space-y-8">
                    <InteractiveText text="ฝึกพูดภาษาไทย" ipa="fʉ̀k pûut" en="Speaking Practice" isHeader emoji="🗣️" />

                    <div className="bg-white p-6 rounded-2xl shadow-md border border-purple-100">
                        <h3 className="text-lg font-bold text-purple-700 flex items-center gap-2 mb-4">
                            <Icon name="utensils" size={20} /> สถานการณ์: ร้านอาหารตามสั่ง (Restaurant)
                        </h3>
                        <InteractiveText text="สั่งอาหารเมื่อเหนื่อยจากงาน" en="Ordering food when tired." isInstruction />
                        <div className="space-y-4">
                            <InteractiveText text="วันนี้ ทำไม สั่ง พิเศษ?" ipa="wan-née tam-mai sàng phí-sèet?" en="Why did you order 'Extra' today?" speaker="A" />
                            <InteractiveText text="เหนื่อย มาก ครับ... อยากกิน กะเพรา หมูกรอบ" ipa="nʉ̀ai mâak kráp... yàak gin gà-prao mǔu-grɔ̀ɔp" en="I'm tired... I want Basil Crispy Pork." speaker="B" />
                        </div>
                    </div>

                    <div className="bg-white p-6 rounded-2xl shadow-md border border-green-100">
                        <h3 className="text-lg font-bold text-green-700 flex items-center gap-2 mb-4">
                            <Icon name="users" size={20} /> สถานการณ์: ครอบครัว (Family Talk)
                        </h3>
                        <InteractiveText text="คุยกับพี่น้องเรื่องงาน" en="Talking with siblings about work." isInstruction />
                        <div className="space-y-4">
                            <InteractiveText text="ทำงาน เรื่อยๆ ไหม?" ipa="tam-ngaan rʉ̂ai-rʉ̂ai mǎi?" en="Is work going steadily?" speaker="พี่" />
                            <InteractiveText text="ไม่ครับ... ติดงาน ตลอดเวลา" ipa="mâi kráp... dtìt-ngaan dtà-lɔ̀ɔt way-laa" en="No... I'm stuck at work all the time." speaker="น้อง" />
                        </div>
                    </div>
                </div>
            );

            // New Extension Section
            const ExtensionSection = () => (
                <div className="space-y-8">
                    <InteractiveText text="กิจกรรมเสริม" ipa="gìt-jà-gam sěrm" en="Extension Activities" isHeader emoji="🚀" />

                    {/* Extension Roleplay 1 */}
                    <div className="bg-white p-6 rounded-2xl shadow-md border border-amber-100">
                        <h3 className="text-lg font-bold text-amber-700 flex items-center gap-2 mb-4">
                            <Icon name="star" size={20} /> บทบาทสมมติ 1: คนรวยที่ยุ่งมาก
                        </h3>
                        <InteractiveText text="The Rich Person Stuck at Work" en="Use: รวย (rich), เที่ยว (travel), ติดงาน (busy), แฟน (partner)" isInstruction />
                        <div className="space-y-4">
                            <InteractiveText text="ทำไม ไม่ไป เที่ยว ทะเล?" ipa="tam-mai mâi bpai tîao tá-lay?" en="Why don't we go travel to the sea?" speaker="แฟน (Partner)" />
                            <InteractiveText text="เหนื่อย... ติดงาน อยากพัก เรื่อยๆ" ipa="nʉ̀ai... dtìt-ngaan yàak pák rʉ̂ai-rʉ̂ai" en="Tired... stuck at work, want to rest easily." speaker="คุณ (You)" />
                        </div>
                    </div>

                    {/* Extension Roleplay 2 */}
                    <div className="bg-white p-6 rounded-2xl shadow-md border border-rose-100">
                        <h3 className="text-lg font-bold text-rose-700 flex items-center gap-2 mb-4">
                            <Icon name="users" size={20} /> บทบาทสมมติ 2: สั่งอาหารกับครอบครัว
                        </h3>
                        <InteractiveText text="Ordering Food with Family" en="Use: สั่ง (order), แนะนำ (recommend), พี่น้อง (siblings), หมูกรอบ (crispy pork)" isInstruction />
                        <div className="space-y-4">
                            <InteractiveText text="น้อง แนะนำ อาหารตามสั่ง หน่อย" ipa="nóng náe-nam aa-hăan-dtaam-sàng nòi" en="Younger sibling, recommend some made-to-order food." speaker="พี่ (Older Sibling)" />
                            <InteractiveText text="สั่ง กะเพรา หมูกรอบ พิเศษ ไหม?" ipa="sàng gà-prao mǔu-grɔ̀ɔp phí-sèet mǎi?" en="Order extra crispy pork basil?" speaker="น้อง (Younger Sibling)" />
                        </div>
                    </div>

                    {/* Storytelling Challenge */}
                    <div className="bg-sky-900 text-white p-6 rounded-2xl shadow-lg">
                        <h3 className="text-xl font-bold mb-4 flex items-center gap-2">🎯 เล่าเรื่อง (Storytelling)</h3>
                        <p className="text-sky-200 mb-6 text-sm">เล่าเรื่อง 3-5 ประโยคโดยใช้คำศัพท์เหล่านี้ (Tell a 3-5 sentence story using these words):</p>
                        <div className="flex flex-wrap gap-2 mb-6">
                            {['ทำไม', 'เหนื่อย', 'พี่น้อง', 'กลับบ้าน', 'น้ำแข็ง', 'แพง'].map(w => (
                                <span key={w} className="bg-white/10 px-3 py-1 rounded-lg text-sm border border-white/20">{w}</span>
                            ))}
                        </div>
                        <div className="bg-black/20 p-4 rounded-xl italic text-sky-100 border border-sky-700 text-sm">
                            ตัวอย่าง (Example):<br/>
                            "ทำไม วันนี้ เหนื่อย? เพราะ อาหาร แพง มาก... พี่น้อง กลับบ้าน กิน น้ำแข็ง"
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen bg-gray-50 pb-28">
                    <header className="bg-white border-b sticky top-0 z-30 px-4 py-4 shadow-sm">
                        <div className="max-w-2xl mx-auto flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <div className="bg-sky-500 p-2 rounded-xl text-white">
                                    <Icon name="bookOpen" size={24} />
                                </div>
                                <div>
                                    <h1 className="font-bold text-lg leading-tight">เรื่อยๆ</h1>
                                </div>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-2xl mx-auto px-4 pt-6">
                        {section === 'review' && <ReviewSection />}
                        {section === 'learn' && <LearnSection />}
                        {section === 'speaking' && <SpeakingSection />}
                        {section === 'extension' && <ExtensionSection />}
                    </main>

                    <nav className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[95%] max-w-md bg-white/90 backdrop-blur border border-gray-200 shadow-2xl rounded-3xl p-2 flex justify-between items-center z-50">
                        <button 
                            onClick={() => setSection('review')}
                            className={`flex-1 flex flex-col items-center py-2 rounded-2xl transition-all ${section === 'review' ? 'bg-sky-500 text-white shadow-lg' : 'text-gray-400'}`}
                        >
                            <Icon name="refresh" size={20} />
                            <span className="text-[10px] mt-1 font-bold">REVIEW</span>
                        </button>
                        <button 
                            onClick={() => setSection('learn')}
                            className={`flex-1 flex flex-col items-center py-2 rounded-2xl transition-all ${section === 'learn' ? 'bg-sky-500 text-white shadow-lg' : 'text-gray-400'}`}
                        >
                            <Icon name="play" size={20} />
                            <span className="text-[10px] mt-1 font-bold">LEARN</span>
                        </button>
                        <button 
                            onClick={() => setSection('speaking')}
                            className={`flex-1 flex flex-col items-center py-2 rounded-2xl transition-all ${section === 'speaking' ? 'bg-sky-500 text-white shadow-lg' : 'text-gray-400'}`}
                        >
                            <Icon name="messageCircle" size={20} />
                            <span className="text-[10px] mt-1 font-bold">SPEAK</span>
                        </button>
                        <button 
                            onClick={() => setSection('extension')}
                            className={`flex-1 flex flex-col items-center py-2 rounded-2xl transition-all ${section === 'extension' ? 'bg-sky-500 text-white shadow-lg' : 'text-gray-400'}`}
                        >
                            <Icon name="zap" size={20} />
                            <span className="text-[10px] mt-1 font-bold">EXTEND</span>
                        </button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
