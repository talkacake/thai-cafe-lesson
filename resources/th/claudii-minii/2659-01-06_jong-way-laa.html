                e.stopPropagation();
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance(thai);
                    utterance.lang = 'th-TH';
                    utterance.rate = 0.8; 
                    window.speechSynthesis.speak(utterance);
                } else {
                    alert("TTS not supported on this browser.");
                }
            };

            return (
                <div className={`flex flex-col ${center ? 'items-center' : 'items-start'} w-full`}>

                        <span 
                            className={`${textSize} font-bold ${color} thai-text cursor-pointer hover:opacity-75 transition-opacity ${highlight ? 'bg-yellow-100 px-1 rounded' : ''}`}

                            onClick={handleSpeak}

                                className="p-1.5 rounded-full bg-blue-50 text-blue-500 hover:bg-blue-100 active:scale-95 transition-transform shrink-0"

                    { side: "A", thai: "หนังผี ดีกว่า! ตื่นเต้น!", ipa: "nǎng-phǐi dii-gwàa! dtʉ̀ʉn-dtên!", en: "Ghost movies better! Exciting!" },
                    { side: "B", thai: "เพลงรัก ดีกว่า! ง่ายๆ สบาย", ipa: "pleeng-rák dii-gwàa! ngâai-ngâai sà-baai", en: "Love songs better! Easy and comfortable." }
                ]
            }
        ];

        // --- Main App Component ---
        const App = () => {
            // State for Random Word
            const [currentWord, setCurrentWord] = useState(null);
            
            const randomizeWord = () => {
                const randomIndex = Math.floor(Math.random() * reviewVocabList.length);
                setCurrentWord(reviewVocabList[randomIndex]);
            };

            useEffect(() => {
                randomizeWord();
            }, []);

            return (
                <div className="max-w-md mx-auto min-h-screen bg-gray-50 pb-20">
                    {/* Header */}
                    <header className="bg-white p-4 shadow-sm sticky top-0 z-10 border-b border-gray-200 flex justify-between items-center">
                        <h1 className="text-xl font-bold text-gray-800" style={{ fontFamily: "'Kanit', sans-serif" }}>
                            {uiText.mainTitle.thai}
                        </h1>
                        <span className="text-2xl">📅</span>
                    </header>

                    <main className="px-4">
                        
                        {/* Section 1: Review */}
                        <div className="mt-6 mb-8">
                            <div className="border-b-2 border-yellow-400 pb-2 mb-4">
                                <InteractiveText {...uiText.section1.title} textSize="text-xl" />
                                <div className="mt-1">
                                    <InteractiveText {...uiText.section1.subtitle} textSize="text-sm" color="text-gray-500" />
                                </div>
                            </div>

                            <div className="bg-white rounded-xl shadow-md border border-gray-100 p-6 text-center">
                                {currentWord && (
                                    <div className="card-pop">
                                        <div className="text-5xl mb-4">{currentWord.emoji}</div>
                                        <h3 className="text-4xl font-bold text-gray-800 mb-2 thai-text" style={{ fontFamily: "'Sarabun', sans-serif" }}>
                                            {currentWord.thai}
                                        </h3>
                                        <div className="flex justify-center mt-2">
                                            <InteractiveText 
                                                thai={currentWord.thai}
                                                ipa={currentWord.ipa}
                                                en={currentWord.en}
                                                textSize="hidden"
                                                center={true}
                                            />
                                        </div>
                                    </div>
                                )}
                                
                                <button 
                                    onClick={randomizeWord}
                                    className="mt-6 w-full bg-yellow-400 hover:bg-yellow-500 text-white font-bold py-3 px-4 rounded-lg shadow-sm transition-all active:scale-95 flex items-center justify-center gap-2"
                                >
                                    <span>🎲</span>
                                    <span style={{ fontFamily: "'Sarabun', sans-serif" }}>{uiText.section1.instruction.thai}</span>
                                </button>
                            </div>
                        </div>

                        {/* Section 2: New Vocab (A1) */}
                        <div className="mb-8">
                            <div className="border-b-2 border-green-400 pb-2 mb-4">
                                <InteractiveText {...uiText.section2.title} textSize="text-xl" />
                                <div className="mt-1">
                                    <InteractiveText {...uiText.section2.subtitle} textSize="text-sm" color="text-gray-500" />
                                </div>
                            </div>

                            <div className="grid grid-cols-1 gap-3">
                                {newVocabList.map((word) => (
                                    <div key={word.id} className="bg-white p-4 rounded-xl border border-gray-200 shadow-sm flex items-center gap-4">
                                        <div className="text-3xl bg-green-50 w-12 h-12 flex items-center justify-center rounded-full">
                                            {word.emoji}
                                        </div>
                                        <div className="flex-1">
                                            <InteractiveText 
                                                thai={word.thai}
                                                ipa={word.ipa}
                                                en={word.en}
                                                textSize="text-xl"
                                            />
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* Section 3: Simple Role Play */}
                        <div className="mb-8">
                            <div className="border-b-2 border-blue-400 pb-2 mb-4">
                                <InteractiveText {...uiText.section3.title} textSize="text-xl" />
                                <div className="mt-1">
                                    <InteractiveText {...uiText.section3.subtitle} textSize="text-sm" color="text-gray-500" />
                                </div>
                            </div>

                            <div className="bg-blue-50 rounded-xl p-4 border border-blue-100 space-y-4">
                                {bookingRolePlay.map((line, idx) => (
                                    <div key={idx} className={`flex gap-3 ${line.speaker === 'A' ? 'flex-row' : 'flex-row-reverse'}`}>
                                        <div className={`w-10 h-10 rounded-full flex items-center justify-center font-bold text-white shrink-0 ${line.speaker === 'A' ? 'bg-blue-400' : 'bg-green-400'}`}>
                                            {line.speaker}
                                        </div>
                                        <div className={`bg-white p-3 rounded-lg shadow-sm max-w-[85%] ${line.speaker === 'A' ? 'rounded-tl-none' : 'rounded-tr-none'}`}>
                                            <InteractiveText 
                                                thai={line.thai}
                                                ipa={line.ipa}
                                                en={line.en}
                                                textSize="text-lg"
                                            />
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* Section 4: Practice Game */}
                        <div className="mb-8">
                             <div className="border-b-2 border-purple-400 pb-2 mb-4">
                                <InteractiveText {...uiText.section4.title} textSize="text-xl" />
                                <div className="mt-1">
                                    <InteractiveText {...uiText.section4.subtitle} textSize="text-sm" color="text-gray-500" />
                                </div>
                            </div>

                            <div className="bg-white rounded-xl border border-purple-100 shadow-sm p-5">
                                <div className="text-center mb-4">
                                    <span className="text-4xl">📝</span>
                                    <h3 className="font-bold text-gray-700 mt-2" style={{ fontFamily: "'Sarabun', sans-serif" }}>แบบฟอร์มจอง</h3>
                                </div>
                                
                                <div className="space-y-4 text-sm">
                                    <div className="p-3 bg-gray-50 rounded border border-gray-200">
                                        <p className="text-gray-500 mb-1" style={{ fontFamily: "'Sarabun', sans-serif" }}>ชื่อ (Name):</p>
                                        <InteractiveText thai="ชื่อ..." ipa="chʉ̂ʉ..." en="My name is..." />
                                    </div>
                                    <div className="p-3 bg-gray-50 rounded border border-gray-200">
                                        <p className="text-gray-500 mb-1" style={{ fontFamily: "'Sarabun', sans-serif" }}>กี่คน (How many people):</p>
                                        <InteractiveText thai="...คน" ipa="...kon" en="...people" />
                                    </div>
                                    <div className="p-3 bg-gray-50 rounded border border-gray-200">
                                        <p className="text-gray-500 mb-1" style={{ fontFamily: "'Sarabun', sans-serif" }}>เวลา (Time):</p>
                                        <InteractiveText thai="พรุ่งนี้ ..." ipa="phrûng-níi..." en="Tomorrow at..." />
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Section 5: Extension Activities */}
                        <div className="mb-12">
                            <div className="border-b-2 border-pink-400 pb-2 mb-4">
                                <InteractiveText {...uiText.section5.title} textSize="text-xl" />
                                <div className="mt-1">
                                    <InteractiveText {...uiText.section5.subtitle} textSize="text-sm" color="text-gray-500" />
                                </div>
                            </div>

                            <div className="space-y-6">
                                {extensionActivities.map((activity) => (
                                    <div key={activity.id} className="bg-white rounded-xl border border-pink-100 shadow-md overflow-hidden">
                                        <div className="bg-pink-50 p-3 flex items-center gap-3 border-b border-pink-100">
                                            <span className="text-2xl">{activity.emoji}</span>
                                            <div className="flex-1">
                                                <InteractiveText {...activity.title} textSize="text-lg font-bold" color="text-pink-800" />
                                                <div className="mt-1">
                                                    <InteractiveText {...activity.desc} textSize="text-xs" color="text-pink-600" />
                                                </div>
                                            </div>
                                        </div>

                                        <div className="p-4 bg-white">
                                            {/* Role Play Content */}
                                            {activity.dialogue && (
                                                <div className="space-y-3">
                                                    {activity.dialogue.map((line, idx) => (
                                                        <div key={idx} className={`flex gap-2 ${line.speaker === 'A' ? 'flex-row' : 'flex-row-reverse'}`}>
                                                            <div className={`w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold shrink-0 ${line.speaker === 'A' ? 'bg-pink-100 text-pink-600' : 'bg-gray-100 text-gray-600'}`}>
                                                                {line.speaker}
                                                            </div>
                                                            <div className={`p-2 rounded-lg text-sm max-w-[90%] ${line.speaker === 'A' ? 'bg-pink-50' : 'bg-gray-50'}`}>
                                                                <InteractiveText thai={line.thai} ipa={line.ipa} en={line.en} />
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            )}

                                            {/* Speaking Game Prompts */}
                                            {activity.prompts && (
                                                <div className="space-y-2">
                                                    {activity.prompts.map((p, idx) => (
                                                        <div key={idx} className="p-2 border border-dashed border-gray-300 rounded bg-gray-50">
                                                            <InteractiveText thai={p.thai} ipa={p.ipa} en={p.en} />
                                                        </div>
                                                    ))}
                                                </div>
                                            )}

                                            {/* Story */}
                                            {activity.story && (
                                                <div className="p-3 bg-yellow-50 rounded border border-yellow-100">
                                                    <InteractiveText thai={activity.story.thai} ipa={activity.story.ipa} en={activity.story.en} />
                                                </div>
                                            )}

                                            {/* Questions */}
                                            {activity.questions && (
                                                <div className="space-y-2">
                                                    {activity.questions.map((q, idx) => (
                                                        <div key={idx} className="flex gap-2 items-start">
                                                            <span className="text-pink-400 mt-1">❓</span>
                                                            <div className="flex-1">
                                                                <InteractiveText thai={q.thai} ipa={q.ipa} en={q.en} />
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            )}

                                            {/* Debate */}
                                            {activity.points && (
                                                <div className="grid grid-cols-1 gap-2">
                                                    {activity.points.map((p, idx) => (
                                                        <div key={idx} className={`p-2 rounded border-l-4 ${p.side === 'A' ? 'border-purple-400 bg-purple-50' : 'border-blue-400 bg-blue-50'}`}>
                                                            <InteractiveText thai={p.thai} ipa={p.ipa} en={p.en} />
                                                        </div>
                                                    ))}
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
