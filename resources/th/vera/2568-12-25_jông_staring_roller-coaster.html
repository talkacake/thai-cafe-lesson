                                onClick={(e) => { e.stopPropagation(); setShowIPA(!showIPA); }}
                                className={`px-2 py-1 text-xs rounded font-bold transition-colors ${showIPA ? 'bg-yellow-200 text-yellow-800' : 'bg-gray-200 text-gray-500'}`}
                            >
                                IPA
                            </button>
                            <button 
                                onClick={(e) => { e.stopPropagation(); setShowEN(!showEN); }}
                                className={`px-2 py-1 text-xs rounded font-bold transition-colors ${showEN ? 'bg-green-200 text-green-800' : 'bg-gray-200 text-gray-500'}`}
                            >
                                EN
                            </button>
                        </div>
                    </div>
                    
                    {(showIPA || showEN) && (
                        <div className="mt-2 space-y-1 animate-fade-in">

                            {showEN && <p className="text-gray-600 italic text-sm sm:text-base">{en}</p>}
                        </div>
                    )}
                </div>
            );
        };

        const VocabCard = ({ item }) => {
            return (
                <div className="bg-orange-50 p-4 rounded-lg border border-orange-200 flex flex-col items-center text-center h-full shadow-sm">
                    <div className="text-4xl mb-2">{item.em}</div>
                    <InteractiveText 
                        text={item.t} 
                        ipa={item.i} 
                        en={item.e} 
                        emoji=""
                    />
                </div>
            );
        };

        const ReviewGame = () => {
            const [currentCard, setCurrentCard] = useState(null);
            const [isFlipped, setIsFlipped] = useState(false);

            const pickCard = () => {
                setIsFlipped(false);
                const random = reviewVocabList[Math.floor(Math.random() * reviewVocabList.length)];
                setCurrentCard(random);
            };

            const speak = (txt) => {
                const u = new SpeechSynthesisUtterance(txt);
                u.lang = 'th-TH';
                window.speechSynthesis.speak(u);
            };

            useEffect(() => { pickCard(); }, []);

            if (!currentCard) return <div>Loading...</div>;

            return (
                <div className="flex flex-col items-center bg-indigo-50 p-6 rounded-2xl shadow-inner border border-indigo-100">
                    <InteractiveText 
                        text="ทบทวนคำศัพท์" 
                        ipa="tóp-tuan kam-sàp" 
                        en="Review Vocabulary" 
                        emoji="🃏"
                        isHeader={true}
                    />

                        <h3 
                            className="text-3xl font-bold text-gray-800 mb-2 cursor-pointer thai-text"

                            </div>

                            <div className="mt-4">
                                <InteractiveText

                                />
                            </div>

                                        emoji="💡"
                                    />
                                </div>
                            </section>

                                <div className="mb-6 border-b-2 border-orange-200 pb-2">
                                    <InteractiveText 
                                        text="คำศัพท์ใหม่" 
                                        ipa="kam-sàp mài" 
                                        en="New Vocabulary"
                                        isHeader={true}
                                        emoji="🔑"
                                    />

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    {targetVocab.map((v, i) => (
                                        <VocabCard key={i} item={v} />

                                </div>
                            </section>

                        {/* SECTION 3: STORY SCRIPT */}
                        {section === 'story' && (
                            <section className="animate-fade-in">
                                <div className="mb-6 border-b-2 border-blue-200 pb-2">
                                    <InteractiveText 
                                        text="บทสนทนา" 
                                        ipa="bòt sǒn-tá-naa" 
                                        en="Dialogue"
                                        isHeader={true}
                                        emoji="🎬"
                                    />
                                </div>

                                {/* Video Link & Instruction */}

                                    </a>
                                </div>

                                <div className="space-y-2">

                                            text={line.t}

                                            emoji={line.em}
                                        />
                                    ))}
                                </div>
                            </section>

                        {/* SECTION 4: ACTIVITIES */}

                                <div className="mb-6 border-b-2 border-green-200 pb-2">

                                        isHeader={true}
                                        emoji="🗣️"
                                    />
                                </div>

                                        text="บทบาทสมมติ (Role Play)" 
                                        ipa="bòt-bàat sǒm-mút" 
                                        en="Role Play"
                                        isHeader={true}
                                        emoji="🎭"
                                    />
                                    <InteractiveText 
                                        text="แสดงเป็น เพียว และ ลอฟต์" 
                                        ipa="sà-dɛɛng bpen Pure lɛ́ Loft" 
                                        en="Act as Pure and Loft"
                                        isInstruction={true}
                                    />
                                    <InteractiveText 
                                        text="ลอง จ้อง เพื่อน แล้วพูดบท" 
                                        ipa="lɔɔng jɔ̂ng pʉ̂an lɛ́ɛo pûut bòt"

                                        isInstruction={true}
                                        emoji="👁️"
                                    />

                                {/* Discussion */}

                                    <InteractiveText 
                                        text="ชวนคุย" 
                                        ipa="chuan kui" 
                                        en="Discussion"
                                        isHeader={true}
                                        emoji="💬"
                                    />
                                    <div className="space-y-4">
                                        <InteractiveText 
                                            text="คุณชอบให้คน จ้อง ไหม?"
                                            ipa="kun chɔ̂ɔp hâi kon jɔ̂ng mǎi?"
                                            en="Do you like people staring at you?"
                                            emoji="🤔"
                                        />
                                        <InteractiveText 
                                            text="คุณคิดว่า ตัวเอง หน้าตาดี ไหม?"
                                            ipa="kun kít wâa dtua-eeng nâa-dtaa-dii mǎi?"
                                            en="Do you think you are good looking?"
                                            emoji="🪞"
                                        />
                                        <InteractiveText 
                                            text="ใคร หน้าตาดี ที่สุดในโลก?"
                                            ipa="krai nâa-dtaa-dii tîi-sùt nai lôok?"
                                            en="Who is the best looking person in the world?"
                                            emoji="🌎"
                                        />
                                    </div>
                                </div>

                                {/* Game */}
                                <div className="bg-gradient-to-br from-orange-100 to-red-100 p-6 rounded-xl shadow-md">
                                    <InteractiveText 
                                        text="เกม: ใครกันนะ?" 
                                        ipa="game: krai gan ná?" 
                                        en="Game: Who is it?"
                                        isHeader={true}
                                        emoji="❓"
                                    />
                                    <InteractiveText 
                                        text="ครูจะอธิบาย หน้าตา นักเรียนทายว่าใคร" 
                                        ipa="kruu jà à-tí-baai nâa-dtaa · nák-rian taai wâa krai" 
                                        en="Teacher describes appearance, student guesses who."

                                        text="กิจกรรมเสริม ฮาๆ"

                                        text="1. แต่งเรื่องตลก (Funny Story)"

                                        isHeader={true}
                                        emoji="📖"
                                    />

                                        <span className="bg-purple-100 text-purple-800 px-3 py-1 rounded-full text-sm font-bold">แฟนเก่า (Ex)</span>
                                        <span className="bg-purple-100 text-purple-800 px-3 py-1 rounded-full text-sm font-bold">จ้อง (Stare)</span>
                                        <span className="bg-purple-100 text-purple-800 px-3 py-1 rounded-full text-sm font-bold">กลางคืน (At night)</span>
                                        <span className="bg-purple-100 text-purple-800 px-3 py-1 rounded-full text-sm font-bold">น่ากลัว (Scary)</span>
                                    </div>
                                    <InteractiveText 
                                        text="ลองแต่งเรื่องสั้นๆ ดูซิ!" 
                                        ipa="lɔɔng dtɛ̀ng rʉ̂ang sân-sân duu sí!" 
                                        en="Try to make a short story!"
                                        isInstruction={true}
                                    />
                                </div>

                                {/* 2. Funny Debate */}

                                    <div className="absolute top-0 right-0 -mt-2 -mr-2 bg-red-200 w-16 h-16 rounded-full opacity-50"></div>
                                    <InteractiveText 
                                        text="2. ดีเบตฮาๆ (Funny Debate)" 
                                        ipa="2. dii-bèet haa-haa" 
                                        en="Choose a topic and argue!"
                                        isHeader={true}
                                        emoji="🎙️"
                                    />
                                    <div className="space-y-4">
                                        <div className="p-4 bg-red-50 rounded-lg border border-red-100">
                                            <InteractiveText 
                                                text="หัวข้อ A: เป็นโสด ดีกว่า แต่งงาน" 
                                                ipa="hǔa-kɔ̂ɔ A: bpen sòot · dii-gwàa · dtɛ̀ng-ngaan" 
                                                en="Topic A: Being single is better than getting married."
                                                emoji="💔 vs 💍"
                                            />
                                        </div>
                                        <div className="p-4 bg-red-50 rounded-lg border border-red-100">
                                            <InteractiveText 
                                                text="หัวข้อ B: เงินสด สำคัญกว่า ความรัก" 
                                                ipa="hǔa-kɔ̂ɔ B: ngən-sòt · sǎm-kan gwàa · kwaam-rák" 
                                                en="Topic B: Cash is more important than love."
                                                emoji="💵 vs ❤️"
                                            />
                                        </div>
                                    </div>
                                </div>

                                {/* 3. Funny Role Play */}
                                <div className="bg-white p-6 rounded-xl shadow-md border border-green-100 relative overflow-hidden">
                                    <div className="absolute top-0 right-0 -mt-2 -mr-2 bg-green-200 w-16 h-16 rounded-full opacity-50"></div>
                                    <InteractiveText 
                                        text="3. บทบาทสมมติสุดฮา" 
                                        ipa="3. bòt-bàat sǒm-mút sùt haa" 
                                        en="Hilarious Role Play: The Stingy Customer"
                                        isHeader={true}
                                        emoji="🎭"
                                    />
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-4">
                                        <div className="bg-green-50 p-3 rounded-lg">

                                            <p className="text-sm text-gray-600 mt-1">มีเงินแค่ 5 บาท แต่อยากซื้อของเยอะๆ (Has only 5 baht but wants to buy everything)</p>
                                        </div>
                                        <div className="bg-green-50 p-3 rounded-lg">
                                            <strong className="text-green-800">B: แม่ค้า (Seller)</strong>
                                            <p className="text-sm text-gray-600 mt-1">โมโหแล้ว จ้องหน้าลูกค้า (Angry and stares at customer)</p>

                                    <InteractiveText 
                                        text="เริ่มเลย! ใช้คำว่า: แพง, บาท, ไม่พอ"

                    </main>

                            en="Tap sentence to listen"
                            isInstruction={true}
                        />
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
