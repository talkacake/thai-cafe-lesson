                        <div className="flex-1 cursor-pointer group" onClick={speak}>
                            <p className={textClass}>
                                {text} {emoji} <span className="text-gray-400 group-hover:text-sky-500 text-lg inline-block align-middle transition-colors">🔊</span>
                            </p>
                        </div>
                        <div className="flex gap-2 flex-col sm:flex-row shrink-0">
                            <button 
                                onClick={(e) => { e.stopPropagation(); setShowIPA(!showIPA); }}
                                className={`px-2 py-1 text-xs rounded-lg font-bold btn-toggle ${showIPA ? 'bg-amber-200 text-amber-900' : 'bg-gray-200 text-gray-500'}`}
                            >
                                IPA
                            </button>
                            <button 
                                onClick={(e) => { e.stopPropagation(); setShowEN(!showEN); }}
                                className={`px-2 py-1 text-xs rounded-lg font-bold btn-toggle ${showEN ? 'bg-emerald-200 text-emerald-900' : 'bg-gray-200 text-gray-500'}`}
                            >
                                EN
                            </button>
                        </div>
                    </div>
                    
                    {(showIPA || showEN) && (
                        <div className="mt-3 space-y-1 p-2 bg-gray-50 rounded-lg animate-fade-in">
                            {showIPA && <p className="text-sky-600 font-mono text-sm sm:text-base border-b border-gray-100 pb-1">{ipa}</p>}
                            {showEN && <p className="text-gray-600 italic text-sm sm:text-base">{en}</p>}
                        </div>
                    )}
                </div>
            );
        };

        const VocabCard = ({ item }) => (
            <div className="bg-white p-4 rounded-xl border border-sky-100 flex flex-col items-center text-center h-full shadow-sm hover:shadow-md transition-shadow">
                <div className="text-5xl mb-3">{item.em}</div>
                <InteractiveText text={item.t} ipa={item.i} en={item.e} emoji="" />
            </div>
        );

        // Section 1: Review Game
        const ReviewGame = () => {
            const [currentCard, setCurrentCard] = useState(null);
            
            const pickCard = () => {
                const random = reviewVocabList[Math.floor(Math.random() * reviewVocabList.length)];
                setCurrentCard(random);
            };

            useEffect(() => { pickCard(); }, []);

            if (!currentCard) return <div>Loading...</div>;

            return (
                <div className="flex flex-col items-center bg-indigo-50 p-6 rounded-3xl shadow-inner border border-indigo-100">
                    <InteractiveText 
                        text="ทบทวนคำศัพท์" 
                        ipa="tóp-tuan kam-sàp" 
                        en="Review Vocabulary" 
                        emoji="🃏"
                        isHeader={true}
                    />
                    
                    <div className="w-full max-w-sm bg-white rounded-2xl shadow-xl p-8 min-h-[260px] flex flex-col items-center justify-center relative mb-6 text-center">
                        <div className="text-6xl mb-4 animate-bounce">{currentCard.em}</div>
                        <InteractiveText 
                            text={currentCard.t} 
                            ipa={currentCard.i} 
                            en={currentCard.e} 
                        />
                        <div className="mt-4 w-full">
                            <InteractiveText 
                                text="สร้างประโยค" 
                                ipa="sâang bprà-yòok" 
                                en="Make a sentence"
                                isInstruction={true}
                            />
                        </div>
                    </div>

                    <button 
                        onClick={pickCard}
                        className="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-8 rounded-full shadow-lg transition-transform active:scale-95 flex items-center gap-2 text-lg"
                    >
                        <span>สุ่มคำต่อไป 🎲</span>
                    </button>
                </div>
            );
        };

        // Main App Component
        const App = () => {
            const [section, setSection] = useState('review');

            return (
                <div className="min-h-screen pb-16">
                    {/* Navigation */}
                    <nav className="bg-white/90 backdrop-blur-md sticky top-0 z-50 border-b border-gray-200 px-4 py-3 shadow-sm">
                        <div className="max-w-4xl mx-auto flex justify-between items-center">
                            <h1 className="text-xl font-bold text-sky-700 flex items-center gap-2">
                                🏠 ติดงาน
                            </h1>
                            <div className="flex gap-2 overflow-x-auto no-scrollbar">
                                {[
                                    {id: 'review', icon: '🃏', label: 'ทบทวน'},
                                    {id: 'learn', icon: '📺', label: 'บทเรียน'},
                                    {id: 'activity', icon: '🎭', label: 'กิจกรรม'},
                                    {id: 'extension', icon: '✨', label: 'เสริม'}
                                ].map(tab => (
                                    <button 
                                        key={tab.id}
                                        onClick={() => setSection(tab.id)} 
                                        className={`px-3 py-1.5 rounded-full text-sm font-bold whitespace-nowrap transition-colors
                                            ${section === tab.id ? 'bg-sky-600 text-white shadow-md' : 'bg-gray-100 text-gray-500 hover:bg-gray-200'}`}
                                    >
                                        {tab.icon} {tab.label}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </nav>

                    <main className="max-w-3xl mx-auto p-4 space-y-8 mt-4">
                        
                        {/* 1. REVIEW SECTION */}
                        {section === 'review' && (
                            <section className="animate-fade-in">
                                <ReviewGame />
                                <div className="mt-4 p-4 bg-yellow-50 rounded-xl border border-yellow-200 text-center">
                                    <InteractiveText 
                                        text="นักเรียนแต่งประโยคจากคำศัพท์" 
                                        ipa="nák-rian dtɛ̀ng bprà-yòok jàak kam-sàp" 
                                        en="Student makes a sentence from the vocabulary."
                                        isInstruction={true}
                                        emoji="🗣️"
                                    />
                                </div>
                            </section>
                        )}

                        {/* 2. LESSON SECTION (Video, Script, Vocab) */}
                        {section === 'learn' && (
                            <section className="animate-fade-in space-y-8">
                                {/* Video */}
                                <div className="bg-black rounded-xl overflow-hidden shadow-xl aspect-video relative flex items-center justify-center">
                                    <iframe 
                                        className="w-full h-full"
                                        src="https://www.youtube.com/embed/584Dgp4GtA0" 
                                        title="YouTube video player" 
                                        frameBorder="0" 
                                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                                        allowFullScreen>
                                    </iframe>
                                </div>
                                <div className="text-center">
                                    <InteractiveText 
                                        text="ดูวิดีโอแล้วสังเกตคำศัพท์" 
                                        ipa="duu wí-dii-oo lɛ́ɛo sǎng-gèet kam-sàp" 
                                        en="Watch video and notice the vocabulary"
                                        isInstruction={true}
                                        emoji="👀"
                                    />
                                </div>

                                {/* Target Vocab */}
                                <div>
                                    <div className="mb-4 border-b-2 border-orange-200 pb-2">
                                        <InteractiveText text="คำศัพท์น่ารู้" ipa="kam-sàp nâa-rúu" en="Target Vocabulary" isHeader={true} emoji="🔑" />
                                    </div>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                        {targetVocab.map((v, i) => <VocabCard key={i} item={v} />)}
                                    </div>
                                </div>

                                {/* Script */}
                                <div>
                                    <div className="mb-4 border-b-2 border-blue-200 pb-2">
                                        <InteractiveText text="บทสนทนา" ipa="bòt sǒn-tá-naa" en="Dialogue" isHeader={true} emoji="💬" />
                                    </div>
                                    <div className="space-y-3">
                                        {scriptData.map((line, index) => (
                                            <InteractiveText 
                                                key={index}
                                                speaker={line.r}
                                                text={line.t}
                                                ipa={line.i}
                                                en={line.e}
                                                emoji={line.em}
                                            />
                                        ))}
                                    </div>
                                </div>
                            </section>
                        )}

                        {/* 3. FUN ACTIVITIES SECTION */}
                        {section === 'activity' && (
                            <section className="animate-fade-in space-y-8">
                                <InteractiveText text="กิจกรรมสนุกๆ" ipa="gìt-jà-gam sà-nùk sà-nùk" en="Fun Activities" isHeader={true} emoji="🎉" />

                                {/* Activity 1: Role Play */}
                                <div className="bg-white p-6 rounded-2xl shadow-lg border border-purple-100 relative overflow-hidden">
                                    <div className="absolute top-0 right-0 w-20 h-20 bg-purple-100 rounded-bl-full opacity-50"></div>
                                    <h3 className="text-xl font-bold text-purple-700 mb-3 flex items-center gap-2">🎭 บทบาทสมมติ</h3>
                                    <InteractiveText text="ฮีโร่ขี้เกียจ" ipa="hero kîi-gìat" en="The Lazy Hero" isInstruction={true} />
                                    
                                    <div className="space-y-2 mt-4">
                                        <div className="p-3 bg-purple-50 rounded-lg">
                                            <strong className="text-purple-900 block mb-1">บอส:</strong>
                                            <InteractiveText text="ไปช่วยโลก เหนื่อยไหม" ipa="bpai chûai lôok · nʉ̀ai mǎi" en="Is saving the world tiring?" emoji="🌎" />
                                        </div>
                                        <div className="p-3 bg-purple-50 rounded-lg">
                                            <strong className="text-purple-900 block mb-1">ฮีโร่:</strong>
                                            <InteractiveText text="ก็ เรื่อยๆ ครับ ขอนอนก่อน" ipa="gɔ̂ rʉ̂ai-rʉ̂ai kráp · kɔ̌ɔ nɔɔn gɔ̀ɔn" en="So-so... let me sleep first." emoji="😴" />
                                        </div>
                                    </div>
                                </div>

                                {/* Activity 2: Funny Interview */}
                                <div className="bg-white p-6 rounded-2xl shadow-lg border border-green-100 relative overflow-hidden">
                                    <div className="absolute top-0 right-0 w-20 h-20 bg-green-100 rounded-bl-full opacity-50"></div>
                                    <h3 className="text-xl font-bold text-green-700 mb-3 flex items-center gap-2">🎤 สัมภาษณ์คนดัง</h3>
                                    <InteractiveText 
                                        text="สัมภาษณ์คนดัง ที่ ติดงาน ตลอดเวลา" 
                                        ipa="sǎm-pâat kon-dang · tîi dtìt-ngaan · dtà-lɔ̀ɔt wee-laa" 
                                        en="Interview a celeb who is always 'stuck at work'" 
                                        isInstruction={true} 
                                    />
                                    
                                    <div className="mt-4 space-y-3">
                                        <InteractiveText 
                                            text="ถาม: ทำไมไม่มาปาร์ตี้?" 
                                            ipa="tǎam: tam-mai mâi maa party?" 
                                            en="Q: Why didn't you come to the party?" 
                                        />
                                        <InteractiveText 
                                            text="ตอบ: ผม ติดงาน" 
                                            ipa="dtɔ̀ɔp: pǒm dtìt-ngaan" 
                                            en="A: I was stuck at work (actually eating buffet 🍕)" 
                                        />
                                        <InteractiveText 
                                            text="ถาม: แฟนมาด้วยไหม?" 
                                            ipa="tǎam: fɛɛn maa dûai mǎi?" 
                                            en="Q: Did your girlfriend come along?" 
                                        />
                                        <InteractiveText 
                                            text="ตอบ: ไม่ มาด้วย" 
                                            ipa="dtɔ̀ɔp: mâi maa dûai" 
                                            en="A: Did not come with me." 
                                        />
                                    </div>
                                </div>

                                {/* Activity 3: Debate */}
                                <div className="bg-white p-6 rounded-2xl shadow-lg border border-red-100 relative overflow-hidden">
                                    <div className="absolute top-0 right-0 w-20 h-20 bg-red-100 rounded-bl-full opacity-50"></div>
                                    <h3 className="text-xl font-bold text-red-700 mb-3 flex items-center gap-2">🔥 ดีเบตฮาๆ</h3>
                                    <InteractiveText text="ทำงาน เรื่อยๆ หรือ ปาร์ตี้หนักๆ" ipa="tam-ngaan rʉ̂ai-rʉ̂ai · rʉ̌ʉ · party nàk-nàk" en="Work steadily OR Party hard?" isInstruction={true} emoji="⚖️" />
                                    
                                    <div className="mt-4">
                                        <InteractiveText 
                                            text="ใช้คำศัพท์: เหนื่อย, ติดงาน, ทำไม" 
                                            ipa="chái kam-sàp: nʉ̀ai, dtìt-ngaan, tam-mai" 
                                            en="Use vocab: Tired, Busy, Why" 
                                            isInstruction={true}
                                        />
                                    </div>
                                </div>
                            </section>
                        )}

                        {/* 4. EXTENSION SECTION */}
                        {section === 'extension' && (
                            <section className="animate-fade-in space-y-8">
                                <InteractiveText text="กิจกรรมเสริม" ipa="gìt-jà-gam sěrm" en="Extension Activities" isHeader={true} emoji="🚀" />

                                {/* Story Telling */}
                                <div className="bg-gradient-to-br from-indigo-50 to-blue-50 p-6 rounded-2xl border border-indigo-100">
                                    <InteractiveText 
                                        text="แต่งเรื่องตลก: เจ้าบ่าวที่หายไป" 
                                        ipa="dtɛ̀ng rʉ̂ang dtà-lòk: jâo-bàao tîi hǎai bpai" 
                                        en="Funny Story: The Runaway Groom"
                                        isHeader={true}
                                        emoji="🤵💨" 
                                    />
                                    <InteractiveText 
                                        text="ใช้คำเหล่านี้แต่งเรื่องเกี่ยวกับเจ้าบ่าวที่ไม่มางานแต่งงาน" 
                                        ipa="chái kam lào níi dtɛ̀ng rʉ̂ang gìao-gàp jâo-bàao tîi mâi maa ngaan-dtɛ̀ng-ngaan" 
                                        en="Use these words to tell a story about a groom who didn't come to his own wedding." 
                                        isInstruction={true}
                                    />
                                    
                                    <div className="flex flex-wrap gap-2 mt-4">
                                        {['ทำไม', 'ติดงาน', 'เหนื่อย', 'แฟนเก่า', 'ลูกพลับ'].map(word => (
                                            <span key={word} className="bg-white px-3 py-1 rounded-full text-sm font-bold shadow-sm text-indigo-600 border border-indigo-100">{word}</span>
                                        ))}
                                    </div>
                                </div>

                                {/* Presentation */}
                                <div className="bg-gradient-to-br from-orange-50 to-amber-50 p-6 rounded-2xl border border-orange-100">
                                    <InteractiveText 
                                        text="นำเสนอ: วิธีแกล้งทำเป็นยุ่ง" 
                                        ipa="nam-sà-nə̌ə: wí-tii glɛ̂ɛng tam-bpen yûng" 
                                        en="Presentation: How to pretend to be busy"
                                        isHeader={true}
                                        emoji="📊" 
                                    />
                                    <InteractiveText 
                                        text="สอนเพื่อนพูดว่า 'ติดงาน' ให้ดูจริงจัง" 
                                        ipa="sɔ̌ɔn pʉ̂an pûut wâa 'dtìt-ngaan' hâi duu jing-jang" 
                                        en="Teach friends how to say 'Stuck at work' seriously."
                                        isInstruction={true}
                                    />
                                </div>
                            </section>
                        )}

                    </main>

                    {/* Footer Tip */}
                    <div className="fixed bottom-4 right-4 bg-white/95 backdrop-blur shadow-xl border border-gray-200 p-3 rounded-xl z-50 text-xs text-gray-500 max-w-[150px] text-center">
                         แตะข้อความเพื่อฟังเสียง 🔊
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
