    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #fff7ed; /* Orange-50 */
        }
        .thai-text {
            color: #1f2937;
        }
        /* Hide scrollbar for clean look */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1; 
        }
        ::-webkit-scrollbar-thumb {
            background: #fb923c; 
            border-radius: 4px;
        }
        .btn-toggle {
            transition: all 0.2s;
        }
        .btn-toggle.active {
            background-color: #ea580c; /* Orange-600 */
            color: white;
            border-color: #ea580c;
        }
        .card-anim {
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="pb-20">

            </div>

                </div>

            </div>
        </section>

        // --- RANDOMIZER FUNCTION ---
        function randomWord() {
            const container = document.getElementById('random-card-content');
            const randomItem = vocabList[Math.floor(Math.random() * vocabList.length)];
            
            // Re-use the sentence template logic but for a single big card
            container.innerHTML = '';
            
            const card = document.createElement('div');
            card.className = "card-anim";
            
            card.innerHTML = `
                <div class="flex flex-col items-center gap-2">
                    <button onclick="speakThai('${randomItem.t}')" class="text-orange-500 hover:text-orange-700 mb-2">
                         <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">

                        </svg>
                    </button>
                    <h3 class="text-3xl font-bold text-gray-800 text-center mb-2 cursor-pointer" onclick="speakThai('${randomItem.t}')">${randomItem.t}</h3>
                    
                    <div class="flex gap-2 mb-3">
                        <button onclick="this.nextElementSibling.classList.toggle('hidden')" class="text-xs border border-orange-300 px-3 py-1 rounded text-orange-600 hover:bg-orange-100">Show IPA</button>
                        <div class="hidden text-lg font-mono text-indigo-600 bg-indigo-50 px-2 rounded">${randomItem.i}</div>
                    </div>

                    <div class="flex gap-2">
                        <button onclick="this.nextElementSibling.classList.toggle('hidden')" class="text-xs border border-orange-300 px-3 py-1 rounded text-orange-600 hover:bg-orange-100">Show EN</button>
                        <div class="hidden text-lg text-gray-600 font-semibold">${randomItem.e}</div>
                    </div>
                </div>
            `;
            container.appendChild(card);
            
            // Auto speak on appear (optional, maybe better not to to let them read first)
            // speakThai(randomItem.t);
        }

        // --- RENDER FUNCTIONS ---

        // Render a list of sentences (with dividers)
        function renderList(data, containerId) {
            const container = document.getElementById(containerId);
            container.innerHTML = ''; // Clear
            data.forEach(item => {
                const el = createInteractiveElement(item);
                el.classList.add('border-b', 'border-gray-100', 'pb-4'); 
                container.appendChild(el);
            });
        }

        function renderSingle(dataItem, targetId, customClass = '') {
            const container = document.getElementById(targetId);
            if(container) {
                container.innerHTML = ''; 
                const el = createInteractiveElement(dataItem);
                if(customClass) {
                    const thaiText = el.querySelector('.thai-content');
                    thaiText.className = `thai-content cursor-pointer select-none leading-relaxed text-gray-800 ${customClass}`;
                }
                container.appendChild(el);
            }
        }

        // Core Function: Create the DOM element from template
        function createInteractiveElement(item) {
            const template = document.getElementById('sentence-template');
            const clone = template.content.cloneNode(true);
            const root = clone.querySelector('div'); 

            // Set Thai Content
            const thaiEl = clone.querySelector('.thai-content');
            thaiEl.textContent = item.thai;
            thaiEl.onclick = () => speakThai(item.thai);

            // Set Hidden Content
            clone.querySelector('.ipa-display').textContent = item.ipa;
            clone.querySelector('.en-display').textContent = item.en;

            // Setup Speak Button
            const speakBtn = clone.querySelector('.speak-btn');
            speakBtn.onclick = () => speakThai(item.thai);

            // Setup Toggles
            const ipaBtn = clone.querySelector('.ipa-toggle');
            const ipaDiv = clone.querySelector('.ipa-display');
            
            ipaBtn.onclick = () => {
                ipaDiv.classList.toggle('hidden');
                toggleBtnStyle(ipaBtn);
            };

            const enBtn = clone.querySelector('.en-toggle');
            const enDiv = clone.querySelector('.en-display');
            
            enBtn.onclick = () => {
                enDiv.classList.toggle('hidden');
                toggleBtnStyle(enBtn);
            };

            // Assign generic classes for "Toggle All" feature
            ipaDiv.classList.add('all-ipa');
            enDiv.classList.add('all-en');

            return root;
        }

        function toggleBtnStyle(btn) {
            btn.classList.toggle('active');
        }

        // --- TTS LOGIC ---
        function speakThai(text) {
            window.speechSynthesis.cancel();
            // Clean text
            const cleanText = text.replace(/[\u{1F600}-\u{1F64F}\u{1F300}-\u{1F5FF}\u{1F680}-\u{1F6FF}\u{1F1E0}-\u{1F1FF}]/gu, ''); 
            
            const utterance = new SpeechSynthesisUtterance(cleanText);
            utterance.lang = 'th-TH';
            utterance.rate = 0.9; 

            const voices = window.speechSynthesis.getVoices();
            const thaiVoice = voices.find(v => v.lang.includes('th'));
            if (thaiVoice) utterance.voice = thaiVoice;

            window.speechSynthesis.speak(utterance);
        }

        // --- TOGGLE ALL LOGIC ---
        function toggleAll(type) {
            const targets = document.querySelectorAll(`.all-${type}`);
            if(targets.length === 0) return;
            
            const isHidden = targets[0].classList.contains('hidden');
            
            targets.forEach(el => {
                if (isHidden) el.classList.remove('hidden');
                else el.classList.add('hidden');
            });

            // Update all buttons of that type to match state
            const allBtns = document.querySelectorAll(`.${type}-toggle`);
            allBtns.forEach(btn => {
                const isActive = btn.classList.contains('active');
                if (isHidden && !isActive) toggleBtnStyle(btn);
                if (!isHidden && isActive) toggleBtnStyle(btn);
            });
        }

        // --- INITIALIZATION ---
        document.addEventListener('DOMContentLoaded', () => {
            // Render Headers & Instructions
            renderSingle(uiData.headerFood, 'header-food', 'text-xl font-bold');
            renderSingle(uiData.instrFood, 'instr-food', 'text-gray-600 text-sm');
            renderSingle(uiData.headerExtension, 'header-extension', 'text-xl font-bold');

            // Render Main Lists
            renderList(foodData, 'food-container');
            renderList(extensionData, 'extension-container');
            
            // Pre-load random card
            randomWord();

            window.speechSynthesis.getVoices();
        });

    </script>
