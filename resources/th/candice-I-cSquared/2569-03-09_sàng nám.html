        const ScriptItem = ({ item }) => {
            return (
                <div className={`rounded-xl shadow-sm p-4 mb-3 border-l-4 ${item.speaker.includes('Customer') ? 'bg-blue-50 border-blue-400' : 'bg-white border-orange-400'}`}>
                    <div className="text-xs font-bold text-gray-400 uppercase tracking-wide mb-1">{item.speaker}</div>
                    <InteractiveText textObj={item} size="lg" color="text-gray-800" />
                </div>
            );
        };

        const DrinkBuilder = () => {
            const [drink, setDrink] = useState(null);
            const [temp, setTemp] = useState(null);
            const [sugar, setSugar] = useState(null);
            const [amount, setAmount] = useState(1);

            const speakOrder = () => {
                if(!drink) return;
                let sentence = `${drink.thai}`;
                if (temp) sentence += ` ${temp.thai}`;
                sentence += ` ${amount} แก้ว`;
                if (sugar) sentence += ` ${sugar.thai}`;
                speak(sentence);
            };

            return (
                <div className="bg-white rounded-2xl shadow-sm border-2 border-orange-100 p-5 mb-6">
                    {/* Display */}
                    <div className="bg-orange-50 rounded-xl p-5 text-center mb-6 min-h-[120px] flex flex-col justify-center items-center shadow-inner border border-orange-200">
                        <div className="flex items-center gap-2 flex-wrap justify-center text-xl font-bold text-gray-800 mb-3">
                            {drink ? <span>{drink.emoji} {drink.thai}</span> : <span className="text-gray-300">...</span>}
                            {temp && <span className="text-red-500">{temp.thai}</span>}
                            {drink && <span className="bg-white px-2 py-1 rounded shadow-sm text-blue-600 border border-blue-100">{amount} แก้ว</span>}
                            {sugar && <span className="text-purple-600 text-sm bg-purple-100 px-2 py-1 rounded">({sugar.thai})</span>}
                        </div>
                        {drink && (
                            <button onClick={speakOrder} className="bg-orange-500 text-white px-6 py-2 rounded-full shadow-md flex items-center gap-2 font-bold active:scale-95 transition-transform">
                                <i className="ph ph-speaker-high text-xl"></i> ฟังประโยค (Listen)
                            </button>
                        )}
                    </div>

                    {/* Controls */}
                    <div className="space-y-4">
                        <div>
                            <InteractiveText textObj={{thai: "1. เมนู", ipa: "mee-nuu", en: "Menu"}} size="sm" color="text-gray-500" />
                            <div className="grid grid-cols-3 gap-2 mt-1">
                                {drinks.map(d => (
                                    <button key={d.id} onClick={() => {setDrink(d); speak(d.thai);}} className={`p-2 rounded-xl border-2 flex flex-col items-center gap-1 transition-all ${drink?.id === d.id ? 'bg-orange-100 border-orange-400 shadow-sm' : 'border-gray-100 bg-gray-50 hover:bg-gray-100'}`}>
                                        <InteractiveText textObj={d} size="sm" />
                                    </button>
                                ))}
                            </div>
                        </div>

                        <div className="grid grid-cols-2 gap-4">
                            <div>
                                <InteractiveText textObj={{thai: "2. แบบไหน", ipa: "bàep-nǎi", en: "Which type?"}} size="sm" color="text-gray-500" />
                                <div className="flex flex-col gap-2 mt-1">
                                    <button onClick={() => {setTemp(options[0]); speak(options[0].thai);}} className={`p-2 rounded-xl border-2 flex items-center justify-center gap-2 ${temp?.id === 'hot' ? 'bg-red-50 border-red-400' : 'border-gray-100 bg-gray-50'}`}>
                                        <InteractiveText textObj={options[0]} size="sm" />
                                    </button>
                                    <button onClick={() => {setTemp(options[1]); speak(options[1].thai);}} className={`p-2 rounded-xl border-2 flex items-center justify-center gap-2 ${temp?.id === 'cold' ? 'bg-blue-50 border-blue-400' : 'border-gray-100 bg-gray-50'}`}>
                                        <InteractiveText textObj={options[1]} size="sm" />
                                    </button>
                                </div>
                            </div>
                            
                            <div className="flex flex-col">
                                <InteractiveText textObj={{thai: "3. จำนวน", ipa: "jam-nuan", en: "Amount"}} size="sm" color="text-gray-500" />
                                <div className="flex items-center justify-between border-2 border-gray-100 rounded-xl p-2 bg-gray-50 flex-grow mt-1">
                                    <button onClick={() => setAmount(Math.max(1, amount-1))} className="w-10 h-10 bg-white rounded-lg shadow-sm text-gray-600 text-xl font-bold active:scale-95">-</button>
                                    <span className="font-bold text-2xl w-8 text-center text-blue-800">{amount}</span>
                                    <button onClick={() => setAmount(Math.min(10, amount+1))} className="w-10 h-10 bg-white rounded-lg shadow-sm text-blue-600 text-xl font-bold active:scale-95">+</button>
                                </div>
                            </div>
                        </div>
                        
                        <div>
                            <InteractiveText textObj={{thai: "4. น้ำตาล", ipa: "nám-dtaan", en: "Sugar"}} size="sm" color="text-gray-500" />
                            <div className="flex gap-2 mt-1">
                                <button onClick={() => {setSugar(options[2]); speak(options[2].thai);}} className={`flex-1 p-2 rounded-xl border-2 ${sugar?.id === 'no_sugar' ? 'bg-purple-50 border-purple-400' : 'border-gray-100 bg-gray-50'}`}>
                                    <InteractiveText textObj={options[2]} size="sm" />
                                </button>
                                <button onClick={() => setSugar(null)} className={`flex-1 p-2 rounded-xl border-2 ${sugar === null ? 'bg-gray-200 border-gray-400' : 'border-gray-100 bg-gray-50'}`}>
                                    <InteractiveText textObj={{thai: "ปกติ", ipa: "bpòk-gà-dtì", en: "Normal"}} size="sm" />
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const ExtensionSection = () => {
            return (
                <div className="bg-white rounded-2xl shadow-sm border-2 border-indigo-100 p-5 mb-6">
                    <div className="bg-indigo-50 border border-indigo-200 p-3 rounded-xl mb-4 text-center">
                        <InteractiveText textObj={uiText.extensionNote} size="sm" color="text-indigo-800" />
                    </div>
                    
                    <div className="space-y-4">
                        {extensionActivities.map((act, idx) => (
                            <div key={idx} className="bg-gray-50 border border-gray-200 p-4 rounded-xl shadow-sm">
                                <InteractiveText textObj={act} size="md" color="text-gray-800" />
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const App = () => {
            return (
                <div className="max-w-2xl mx-auto min-h-screen pb-20">
                    {/* Header */}
                    <header className="bg-emerald-600 text-white p-6 rounded-b-3xl shadow-lg mb-8 sticky top-0 z-50 border-b-4 border-emerald-800">
                        <InteractiveText textObj={uiText.mainTitle} size="xl" color="text-white" />
                    </header>

                    <div className="px-4 space-y-10">
                        
                        {/* 1. Review (Random Vocab) */}
                        <section>
                            <div className="mb-4 bg-emerald-100 p-3 rounded-2xl inline-block shadow-sm">
                                <InteractiveText textObj={uiText.sectionReview} size="lg" color="text-emerald-900" />
                            </div>
                            <RandomVocabGenerator />
                        </section>

                        {/* 2. Dialogue */}
                        <section>
                            <div className="mb-4 bg-emerald-100 p-3 rounded-2xl inline-block shadow-sm">
                                <InteractiveText textObj={uiText.sectionDialogue} size="lg" color="text-emerald-900" />
                            </div>
                            
                            {/* Video Link */}
                            <div className="mb-6 bg-blue-50 p-5 rounded-2xl border-2 border-blue-200 flex flex-col items-center shadow-sm">
                                <InteractiveText textObj={uiText.instructionListen} size="md" color="text-blue-900" />
                                <a 
                                    href="https://drive.google.com/open?id=1geCLMZwKzRKhfbf1PwwbHBgjS0-5CV4a&usp=drive_fs" 
                                    target="_blank" 
                                    className="mt-3 inline-flex items-center gap-2 bg-blue-600 text-white px-6 py-3 rounded-full font-bold hover:bg-blue-700 transition-all shadow-md active:scale-95"
                                >
                                    <InteractiveText textObj={uiText.btnVideo} size="md" color="text-white" />
                                </a>
                            </div>

                            <div className="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                                {dialogueScript.map((item, idx) => (
                                    <ScriptItem key={idx} item={item} />
                                ))}
                            </div>
                        </section>

                        {/* 3. Practice Ordering */}
                        <section>
                            <div className="mb-4 bg-emerald-100 p-3 rounded-2xl inline-block shadow-sm">
                                <InteractiveText textObj={uiText.sectionPractice} size="lg" color="text-emerald-900" />
                            </div>
                            <DrinkBuilder />
                        </section>

                        {/* 4. Extension Activities */}
                        <section>
                            <div className="mb-4 bg-indigo-100 p-3 rounded-2xl inline-block shadow-sm">
                                <InteractiveText textObj={uiText.sectionExtension} size="lg" color="text-indigo-900" />
                            </div>
                            <ExtensionSection />
                        </section>

                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
